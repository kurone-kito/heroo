name: The CI workflow on merge as a main branch
run-name: Merged the main branch by @${{ github.actor }}
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main
permissions:
  contents: write
jobs:
  build-website:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    name: Build and deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Stages the pushed branch
        uses: actions/checkout@v4
      - name: Pre-prepare the Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Install the latest corepack explicitly
        run: npm install --force -g corepack@latest
      - name: Enable the corepack
        run: corepack enable
      - name: Post-prepare the Node.js environment
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version-file: .node-version
      - env:
          HUSKY: 0
        name: Install the dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - env:
          BASE_PATH: /heroo
        name: Run the build process
        run: pnpm run build
      - name: Prepare for GitHub Pages deployment
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload to GitHub Pages artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/demo/.output/public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
